<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMCTech - Результаты</title>
    <link rel="stylesheet" href="../css/results.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Сайдбар -->
      <aside class="sidebar">
        <div>
          <div class="logo-area">
            <div class="logo-icon">IM</div>
            <span class="logo-text">IMCTech</span>
          </div>
          <ul class="nav-list">
            <li class="nav-item">
              <a href="dashboard.html">
                <svg class="nav-icon" viewBox="0 0 24 24">
                  <rect x="3" y="3" width="7" height="7" rx="1" />
                  <rect x="14" y="3" width="7" height="7" rx="1" />
                  <rect x="3" y="14" width="7" height="7" rx="1" />
                  <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
                Мои доски
              </a>
            </li>
            <li class="nav-item">
              <a href="dashboard.html">
                <svg class="nav-icon" viewBox="0 0 24 24">
                  <path
                    d="M4 5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5zm6 0a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1V5zm6 0a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1V5z"
                  />
                </svg>
                Доска
              </a>
            </li>
            <li class="nav-item active">
              <a href="results.html">
                <svg class="nav-icon" viewBox="0 0 24 24">
                  <path d="M3 3v18h18" />
                  <path d="M7 16l4-8 4 4 4-10" />
                </svg>
                Результаты
              </a>
            </li>
            <li class="nav-item">
              <a href="settings.html">
                <svg class="nav-icon" viewBox="0 0 24 24">
                  <path
                    d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
                  />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                Настройки
              </a>
            </li>
          </ul>
        </div>
        <div class="user-profile">
          <div class="avatar">АК</div>
          <div class="user-info">
            <div class="name">Алексей К.</div>
            <div class="roles">Администратор · Наставник</div>
          </div>
        </div>
      </aside>

      <!-- Основная часть -->
      <div class="main-wrapper">
        <header class="top-bar">
          <h1 class="page-title">Результаты</h1>
        </header>

        <!-- Статистика -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-icon blue">
              <svg viewBox="0 0 24 24">
                <path
                  d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
              </svg>
            </div>
            <div class="stat-info">
              <div class="stat-value">0</div>
              <div class="stat-label">Всего сдач</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green">
              <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </div>
            <div class="stat-info">
              <div class="stat-value">0</div>
              <div class="stat-label">Принято</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon red">
              <svg viewBox="0 0 24 24">
                <polyline points="1 4 23 20" />
                <polyline points="23 4 1 20" />
              </svg>
            </div>
            <div class="stat-info">
              <div class="stat-value">0</div>
              <div class="stat-label">Возвращено</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon yellow">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
            </div>
            <div class="stat-info">
              <div class="stat-value">0</div>
              <div class="stat-label">На проверке</div>
            </div>
          </div>
        </div>

        <!-- Фильтры -->
        <div class="filters-bar">
          <select id="filterBoard" class="filter-select">
            <option value="">Все доски</option>
          </select>
          <select id="filterStatus" class="filter-select">
            <option value="">Все статусы</option>
            <option value="done">Принято</option>
            <option value="in-progress">Возвращено</option>
            <option value="review">На проверке</option>
          </select>
          <select id="filterStudent" class="filter-select">
            <option value="">Все студенты</option>
          </select>
          <div class="filters-right">
            <input
              type="search"
              id="filterSearch"
              class="filter-input"
              placeholder="Поиск по названию..."
            />
          </div>
        </div>

        <!-- Таблица -->
        <div class="table-container">
          <table class="results-table">
            <thead>
              <tr>
                <th>Задача</th>
                <th>Студент</th>
                <th>Наставник</th>
                <th>Статус</th>
                <th>Дата сдачи</th>
                <th>Комментарий</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>

          <div class="empty-state">
            <svg viewBox="0 0 24 24">
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
              />
              <polyline points="14 2 14 8 20 8" />
            </svg>
            <h3>Нет результатов</h3>
            <p>Пока нет задач, отправленных на проверку</p>
          </div>
        </div>
      </div>
    </div>

    <!-- ✅ ПОДКЛЮЧЕНИЕ СКРИПТОВ -->
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/pages/results.js"></script>
  </body>
</html>
