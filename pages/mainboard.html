<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMCTech - Kanban Доска (Global Scroll)</title>
    <link rel="stylesheet" href="../css/mainboard.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Сайдбар -->
      <aside class="sidebar">
        <div>
          <div class="logo-area">
            <div class="logo-icon">IM</div>
            <span class="logo-text">IMCTech</span>
          </div>
          <ul class="nav-list">
            <li class="nav-item">
              <a href="dashboard.html"
                ><svg class="nav-icon" viewBox="0 0 24 24">
                  <rect x="3" y="3" width="7" height="7" rx="1" />
                  <rect x="14" y="3" width="7" height="7" rx="1" />
                  <rect x="3" y="14" width="7" height="7" rx="1" />
                  <rect x="14" y="14" width="7" height="7" rx="1" /></svg
                >Мои доски</a
              >
            </li>
            <li class="nav-item active">
              <a href="mainboard.html"
                ><svg class="nav-icon" viewBox="0 0 24 24">
                  <path
                    d="M4 5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5zm6 0a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1V5zm6 0a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1V5z"
                  /></svg
                >Доска</a
              >
            </li>
            <li class="nav-item">
              <a href="results.html"
                ><svg class="nav-icon" viewBox="0 0 24 24">
                  <path d="M3 3v18h18" />
                  <path d="M7 16l4-8 4 4 4-10" /></svg
                >Результаты</a
              >
            </li>
            <li class="nav-item">
              <a href="settings.html"
                ><svg class="nav-icon" viewBox="0 0 24 24">
                  <path
                    d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
                  />
                  <circle cx="12" cy="12" r="3" /></svg
                >Настройки</a
              >
            </li>
          </ul>
        </div>
        <div class="user-profile">
          <div class="avatar">АК</div>
          <div class="user-info">
            <div class="name">Алексей К.</div>
            <div class="roles">Администратор · Наставник</div>
          </div>
        </div>
      </aside>

      <!-- Основная часть -->
      <div class="main-wrapper">
        <!-- Верхняя панель -->
        <header class="top-bar">
          <div class="breadcrumbs">
            <span class="prev">IMCTech</span>
            <span class="sep">›</span>
            <span class="current">IMCTech Kanban</span>
          </div>
          <div class="top-actions">
            <input type="search" placeholder="Поиск..." class="search-input" />
            <button class="btn-secondary">Фильтры</button>
          </div>
        </header>

        <!-- Доска (скроллится вся вместе) -->
        <!-- Доска -->
        <main class="board-container">
          <div class="board-columns">
            <!-- Колонка 1: Не начато -->
            <div class="column">
              <div class="column-header">
                <span class="column-dot dot-todo"></span>
                <h3 class="column-title">Не начато</h3>
                <!-- Добавлен класс -->
                <span class="column-count" id="count-todo">0</span>
              </div>
              <div class="column-body">
                <!-- Карточки удалили, скрипт их нарисует сам -->
                <button class="add-task-btn">+ Добавить задачу</button>
              </div>
            </div>

            <!-- Колонка 2: В работе -->
            <div class="column">
              <div class="column-header">
                <span class="column-dot dot-progress"></span>
                <h3 class="column-title">В работе</h3>
                <!-- Добавлен класс -->
                <span class="column-count" id="count-progress">0</span>
              </div>
              <div class="column-body">
                <button class="add-task-btn">+ Добавить задачу</button>
              </div>
            </div>

            <!-- Колонка 3: Готово -->
            <div class="column">
              <div class="column-header">
                <span class="column-dot dot-done"></span>
                <h3 class="column-title">Готово</h3>
                <!-- Добавлен класс -->
                <span class="column-count" id="count-done">0</span>
              </div>
              <div class="column-body">
                <button class="add-task-btn">+ Добавить задачу</button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/pages/mainboard.js"></script>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const boardId =
          params.get("boardId") ||
          localStorage.getItem("imctech_last_board_id");
        if (boardId) {
          const pages = ["mainboard.html", "results.html", "settings.html"];
          document.querySelectorAll(".sidebar a").forEach(function (link) {
            const href = link.getAttribute("href") || "";
            const matched = pages.find(function (p) {
              return href.includes(p);
            });
            if (!matched) return;
            const parts = href.split("?");
            const p = new URLSearchParams(parts[1] || "");
            p.set("boardId", boardId);
            link.setAttribute("href", parts[0] + "?" + p.toString());
          });
          document.querySelectorAll(".sidebar a").forEach(function (link) {
            if (link.textContent.trim() === "Доска") {
              link.setAttribute("href", "mainboard.html?boardId=" + boardId);
            }
          });
        }
        // Подсветка активного пункта
        const currentPage = window.location.pathname.split("/").pop();
        document.querySelectorAll(".nav-item").forEach(function (item) {
          item.classList.remove("active");
        });
        document.querySelectorAll(".nav-item a").forEach(function (link) {
          const href = (link.getAttribute("href") || "")
            .split("?")[0]
            .split("/")
            .pop();
          if (href === currentPage) {
            link.closest(".nav-item").classList.add("active");
          }
        });
      })();
    </script>

    <!-- Модальное окно задачи -->
    <div class="modal-overlay" id="taskModal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">Новая задача</h2>
          <button class="modal-close" id="modalClose">✕</button>
        </div>
        <form id="taskForm" class="modal-body">
          <input type="hidden" id="editingTaskId" />

          <div class="form-group">
            <label class="form-label">Название задачи *</label>
            <input
              type="text"
              id="taskTitle"
              class="form-input"
              placeholder="Введите название задачи"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Описание</label>
            <textarea
              id="taskDescription"
              class="form-textarea"
              placeholder="Опишите задачу..."
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Статус</label>
              <select id="taskStatus" class="form-select">
                <option value="todo">Не начато</option>
                <option value="in-progress">В работе</option>
                <option value="done">Готово</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Приоритет</label>
              <select id="taskPriority" class="form-select">
                <option value="high">↑ Высокий</option>
                <option value="med" selected>− Средний</option>
                <option value="low">↓ Низкий</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Дедлайн</label>
              <input
                type="text"
                id="taskDueDate"
                placeholder="Например: 15.06 или июнь"
                class="form-input"
              />
            </div>

            <div class="form-group">
              <label class="form-label">Теги (через запятую)</label>
              <input
                type="text"
                id="taskTags"
                class="form-input"
                placeholder="Frontend, UX"
              />
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn-cancel" id="modalCancel">
              Отмена
            </button>
            <button type="submit" class="btn-save">Создать задачу</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
