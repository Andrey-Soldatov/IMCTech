<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMCTech - Вход в аккаунт</title>
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <main class="login-card">
      <div class="header">
        <div class="logo-icon">IM</div>
        <span class="logo-text">IMCTech</span>
      </div>

      <h1>Войдите в аккаунт</h1>
      <p class="subtitle">Для доступа к проектной доске ДВФУ</p>

      <button class="oauth-btn yandex" onclick="handleYandexLogin()">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path
            fill="currentColor"
            d="M19.8 10.2L14.4 21.8H9.6L15 10.2H9.6V6.2H19.8V10.2ZM4.2 21.8H0V2.2H4.2V21.8Z"
          />
        </svg>
        Войти через Яндекс
      </button>

      <button class="social-btn">
        <svg
          class="icon-github"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
          />
        </svg>
        Войти через GitHub
      </button>

      <div class="divider">или по email</div>

      <form class="login-form">
        <input
          name="email"
          type="email"
          placeholder="Email"
          class="input-field"
          required
          autocomplete="email"
        />
        <input
          name="password"
          type="password"
          placeholder="Пароль"
          class="input-field"
          required
          autocomplete="current-password"
        />
        <a href="#" class="forgot-link">Забыли пароль?</a>
        <button type="submit" class="btn-primary">Войти</button>
      </form>

      <p class="signup-text">
        Нет аккаунта?
        <a href="register.html" class="signup-link">Зарегистрироваться</a>
      </p>
    </main>

    <script type="module">
      import { login } from "../js/api/auth.js";
      document
        .querySelector(".login-form")
        ?.addEventListener("submit", async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const res = await login(fd.get("email"), fd.get("password"));
          res.success
            ? (window.location.href = "dashboard.html")
            : alert(res.error);
        });
    </script>
    <script>
      function handleYandexLogin() {
        // Перенаправляем на бэкенд для OAuth
        window.location.href = "http://localhost:3000/api/auth/yandex";
      }

      // Обработка callback от OAuth
      window.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("token");
        const oauth = urlParams.get("oauth");

        if (token && oauth === "yandex") {
          console.log("🔑 Получен токен от Яндекса");

          try {
            // Сохраняем токен
            localStorage.setItem("imctech_token", token);

            // Получаем данные пользователя
            const meRes = await fetch("http://localhost:3000/api/auth/me", {
              headers: { Authorization: `Bearer ${token}` },
            });

            if (meRes.ok) {
              const user = await meRes.json();
              localStorage.setItem(
                "imctech_current_user",
                JSON.stringify(user),
              );
              console.log("✅ Пользователь сохранён:", user);

              // Удаляем параметры из URL
              window.history.replaceState(
                {},
                document.title,
                window.location.pathname,
              );

              // 🔥 Перенаправляем на dashboard (с правильным путём!)
              setTimeout(() => {
                window.location.href = "dashboard.html";
              }, 500);
            } else {
              console.error("❌ Ошибка получения данных пользователя");
              alert("Ошибка входа: не удалось получить данные пользователя");
            }
          } catch (error) {
            console.error("❌ Ошибка:", error);
            alert("Ошибка входа через Яндекс");
          }
        }
      });
    </script>
  </body>
</html>
